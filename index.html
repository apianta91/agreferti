<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>AG Referti</title>

  <!-- iPhone Home Screen icon -->
  <link rel="apple-touch-icon" href="logo.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Android / PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0B2FA6" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-login">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbarInner">
      <img id="clubLogo" class="topLogo" src="logo.png" alt="AG" />
      <div id="pageTitle" class="topTitle">LOGIN</div>
      <div class="topSpacer"></div>
    </div>
  </header>

  <!-- Banner -->
  <div id="banner" class="banner hidden"></div>

  <main class="wrap">
    <!-- LOGIN -->
    <section id="view-login" class="view">
      <div class="card cardLogin center">
        <label class="label">Squadra</label>
        <select id="teamSelect" class="input"></select>

        <label class="label">Password</label>
        <input id="passwordInput" class="input" type="password" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false" />

        <div class="row centerRow">
          <label class="check">
            <input id="rememberPw" type="checkbox" />
            <span>Ricorda password</span>
          </label>
        </div>

        <div class="spacer"></div>

        <button id="btnLogin" class="btn primary big full">🔐 Apri Partita</button>
      </div>
    </section>

    <!-- SETTINGS -->
    <section id="view-settings" class="view hidden">
      <div class="card center">
        <label class="label">Squadra</label>
        <select id="setTeam" class="input"></select>

        <label class="label">Avversario</label>
        <input id="setOpponent" class="input" type="text" placeholder="Es. Real Madrid" />

        <label class="label">Casa / Trasferta</label>
        <div class="seg">
          <button id="venueCasa" class="segBtn active" type="button">Casa</button>
          <button id="venueTrasferta" class="segBtn" type="button">Trasferta</button>
        </div>

        <div class="grid2">
          <div class="col">
            <label class="label">Data</label>
            <input id="setDate" class="input" type="date" />
          </div>
          <div class="col">
            <label class="label">Ora</label>
            <input id="setTime" class="input" type="time" />
          </div>
        </div>

        <div class="grid2">
          <div class="col">
            <label class="label">Modalità di Gioco</label>
            <select id="setMode" class="input">
              <option>5v5</option>
              <option>7v7</option>
              <option>9v9</option>
              <option>11v11</option>
            </select>
          </div>
          <div class="col">
            <label class="label">Numero Tempi</label>
            <select id="setPeriods" class="input">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
        </div>

        <label class="label">Durata Tempi (min)</label>
        <select id="setPeriodMin" class="input">
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="35">35</option>
          <option value="40">40</option>
          <option value="45">45</option>
          <option value="custom">Custom</option>
        </select>

        <div id="customMinWrap" class="hidden">
          <label class="label">Inserisci la durata dei tempi</label>
          <input id="setPeriodCustom" class="input" type="number" min="1" placeholder="Es. 12" />
        </div>

        <div class="spacer"></div>

        <div class="actionRow">
          <button id="btnBackSettings" class="btn ghost big actionLeft">← BACK</button>
          <button id="btnOpenMatch" class="btn primary big actionRight">📝 Apri Referto</button>
        </div>
      </div>
    </section>

    <!-- LIVE -->
    <section id="view-live" class="view hidden">
      <div class="card center">
        <div class="scoreboard">
          <div class="sbTeam">
            <div id="teamHome" class="sbName">HOME</div>
            <div id="scoreHome" class="sbScore">0</div>
          </div>
          <div class="sbMid">—</div>
          <div class="sbTeam">
            <div id="teamAway" class="sbName">AWAY</div>
            <div id="scoreAway" class="sbScore">0</div>
          </div>
        </div>

        <div id="metaLine" class="meta"></div>

        <div id="periodButtons" class="periodRow"></div>

        <div class="timerWrap">
          <div id="timerBox" class="timer idle">00:00</div>
          <div id="timerHint" class="hint"></div>
        </div>

        <div class="grid2">
          <button id="btnPlay" class="btn play big full">▶ PLAY</button>
          <button id="btnReset" class="btn reset big full">⟲ RESET</button>
        </div>

        <div class="divider"></div>

        <div class="eventsGrid">
          <button class="eventBtn evBig" data-ev="GOL_FATTO" type="button">
            <div class="evIcon">⚽</div><div class="evTxt">GOL FATTO</div>
          </button>

          <button class="eventBtn evBig" data-ev="GOL_SUBITO" type="button">
            <div class="evIcon">❌</div><div class="evTxt">GOL SUBITO</div>
          </button>

          <button class="eventBtn evBig" data-ev="AMMONIZIONE" type="button">
            <div class="evIcon">🟨</div><div class="evTxt">AMMONIZIONE</div>
          </button>

          <button class="eventBtn evBig" data-ev="ESPULSIONE" type="button">
            <div class="evIcon">🟥</div><div class="evTxt">ESPULSIONE</div>
          </button>

          <button class="eventBtn evBig" data-ev="TIRO" type="button">
            <div class="evIcon">🎯</div><div class="evTxt">TIRO</div>
          </button>

          <button class="eventBtn evBig" data-ev="SOSTITUZIONE" type="button">
            <div class="evIcon">🔁</div><div class="evTxt">SOSTITUZIONE</div>
          </button>
        </div>
        
        <div class="divider"></div>

        <div class="h2">Eventi</div>
        <div id="eventsList" class="eventsList"></div>

        <div class="spacer"></div>

        <div class="actionRow">
          <button id="btnBackLive" class="btn ghost big actionLeft">← BACK</button>
          <button id="btnGoClose" class="btn danger big actionRight">✅ Chiusura Referto</button>
        </div>
      </div>
    </section>

    <!-- CLOSE -->
    <section id="view-close" class="view hidden">
      <div class="card center">
        <div class="scoreboard">
          <div class="sbTeam">
            <div id="teamHomeClose" class="sbName">HOME</div>
            <div id="scoreHomeClose" class="sbScore">0</div>
          </div>
          <div class="sbMid">—</div>
          <div class="sbTeam">
            <div id="teamAwayClose" class="sbName">AWAY</div>
            <div id="scoreAwayClose" class="sbScore">0</div>
          </div>
        </div>

        <div id="metaLineClose" class="meta"></div>

        <label class="label">Voto (1–5, anche 2.5)</label>
        <input id="matchVote" class="input" type="number" step="0.5" min="1" max="5" placeholder="Es. 3.5" />

        <label class="label">Note</label>
        <textarea id="matchNotes" class="input" rows="4" placeholder="Note libere..."></textarea>

        <div class="spacer"></div>

        <div class="actionRow">
          <button id="btnBackClose" class="btn ghost big actionLeft">← BACK</button>
          <button id="btnCloseMatch" class="btn danger big actionRight">🚨 Chiudi Referto</button>
        </div>
      </div>
    </section>

    <!-- EXPORT -->
    <section id="view-export" class="view hidden">
      <div class="card center">
        <div class="exportActions">
          <button id="btnDownloadPDF" class="btn primary big full">📄 Esporta PDF</button>
          <button id="btnCopyWhatsApp" class="btn primary big full">📲 Copia WhatsApp</button>
        </div>

        <div class="divider"></div>

        <div class="driveBox">
          <div id="driveLine" class="driveLine">Caricamento su GoogleDrive – In attesa…</div>
          <div id="archiveStatus" class="driveSub"></div>
        </div>

        <label class="label">Anteprima WhatsApp</label>
        <textarea id="waPreview" class="input" rows="6" readonly></textarea>

        <div class="spacer"></div>

        <div class="actionRow">
          <button id="btnBackExport" class="btn ghost big actionLeft">← BACK</button>
          <button id="btnRestart" class="btn ghost big actionRight">↩ Ricomincia</button>
        </div>

        <div class="exportLogoWrap">
          <img class="exportLogo" src="logo.png" alt="AG" />
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="modalOverlay" class="modalOverlay hidden" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHead">
        <div id="modalTitle" class="modalTitle">Titolo</div>
        <button id="modalX" class="modalX" aria-label="Chiudi">✕</button>
      </div>

      <div id="modalMsg" class="modalMsg"></div>

      <div id="modalForm" class="modalForm hidden">
        <div class="grid2">
          <div class="col">
            <label class="label">Tempo</label>
            <input id="mPeriod" class="input" type="number" min="1" />
          </div>
          <div class="col">
            <label class="label">Minuto</label>
            <input id="mMin" class="input" type="number" min="1" />
          </div>
        </div>

        <div id="mP1Wrap" class="hidden">
          <label id="mP1Label" class="label">Giocatore</label>
          <input id="mP1" class="input" type="text" autocomplete="off" />
        </div>

        <div id="mP2Wrap" class="hidden">
          <label id="mP2Label" class="label">Giocatore 2</label>
          <input id="mP2" class="input" type="text" autocomplete="off" />
        </div>

        <div id="mAssistWrap" class="hidden">
          <label class="label">Assist (opzionale)</label>
          <input id="mAssist" class="input" type="text" autocomplete="off" />
        </div>
      </div>

      <div id="modalErr" class="modalErr hidden"></div>

      <div class="modalBtns">
        <button id="modalCancel" class="btn cancel big">Annulla</button>
        <button id="modalOk" class="btn confirm big">Conferma</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
