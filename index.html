<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>AG Referti</title>

  <link rel="apple-touch-icon" href="ag-referti-pastel-180.png">
  <link rel="icon" type="image/png" href="ag-referti-pastel-180.png">
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#0B2FA6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-login">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbarInner">
      <img id="topLogo" class="topLogo" src="logo.png" alt="AG" />
      <div id="topTitle" class="topTitle">LOGIN</div>
      <div class="topSpacer"></div>
    </div>
  </div>

  <div id="banner" class="banner hidden"></div>

  <div class="wrap">

    <!-- LOGIN -->
    <section id="viewLogin" class="view">
      <div class="card cardLogin">
        <div class="h2">Login</div>

        <label class="label">Squadra</label>
        <select id="loginTeam" class="input"></select>

        <label class="label">Password</label>
        <input id="loginPass" class="input" type="password" autocomplete="off" />

        <div class="spacer"></div>
        <button id="btnLogin" class="btn big full primary">🔐 Apri Partita</button>
      </div>
    </section>

    <!-- IMPOSTAZIONI MATCH -->
    <section id="viewSetup" class="view hidden">
      <div class="card">
        <div class="h2">Impostazioni del Match</div>

        <div class="grid2">
          <div class="col">
            <label class="label">Squadra</label>
            <select id="team" class="input"></select>
          </div>
          <div class="col">
            <label class="label">Modalità</label>
            <select id="mode" class="input"></select>
          </div>
        </div>

        <label class="label">Avversario</label>
        <input id="opponentRaw" class="input" placeholder="Es: Real Madrid" />

        <div class="spacer"></div>

        <div class="seg">
          <button id="btnCasa" class="segBtn" type="button">In casa</button>
          <button id="btnTrasferta" class="segBtn" type="button">In trasferta</button>
        </div>

        <div class="spacer"></div>

        <div class="grid2">
          <div class="col">
            <label class="label">Data partita</label>
            <input id="date" class="input" type="date" />
          </div>
          <div class="col">
            <label class="label">Ora partita</label>
            <input id="time" class="input" type="time" />
          </div>
        </div>

        <div class="spacer"></div>

        <div class="grid2">
          <div class="col">
            <label class="label">Numero tempi</label>
            <select id="periods" class="input"></select>
          </div>
          <div class="col">
            <label class="label">Durata tempi (min)</label>
            <select id="periodMin" class="input"></select>
          </div>
        </div>

        <div class="spacer"></div>

        <div class="actionRow">
          <div class="actionLeft">
            <button id="btnBackSetup" class="btn full ghost" type="button">BACK</button>
          </div>
          <div class="actionRight">
            <button id="btnOpenLive" class="btn big full primary" type="button">📝 Apri Referto</button>
          </div>
        </div>
      </div>
    </section>

    <!-- LIVE -->
    <section id="viewLive" class="view hidden">
      <div class="card">
        <div class="h2">Referto Live</div>

        <div class="scoreboard">
          <div class="sbTeam">
            <div id="teamHome" class="sbName">ALTO GARDA</div>
            <div id="scoreHome" class="sbScore">0</div>
          </div>
          <div class="sbMid">-</div>
          <div class="sbTeam">
            <div id="teamAway" class="sbName">AVVERSARIO</div>
            <div id="scoreAway" class="sbScore">0</div>
          </div>
        </div>

        <div id="meta" class="meta"></div>

        <div id="periodRow" class="periodRow"></div>

        <div class="timerWrap">
          <div id="timerBox" class="timer idle">00:00</div>
          <div id="timerHint" class="hint"></div>
        </div>

        <div class="row">
          <button id="btnPlay" class="btn play">▶ PLAY</button>
          <button id="btnReset" class="btn reset">⟲ RESET</button>
        </div>

        <div class="divider"></div>

        <div class="eventsGrid">
          <button class="eventBtn evBig" data-ev="GOL_FATTO" type="button">
            <div class="evIcon">⚽</div><div class="evTxt">GOL FATTO</div>
          </button>

          <button class="eventBtn evBig" data-ev="GOL_SUBITO" type="button">
            <div class="evIcon">❌</div><div class="evTxt">GOL SUBITO</div>
          </button>

          <button class="eventBtn evBig" data-ev="AMMONIZIONE" type="button">
            <div class="evIcon">🟨</div><div class="evTxt">AMMONIZIONE</div>
            <span id="ammBadge" class="badge badge-yellow hidden">0</span>
          </button>

          <button class="eventBtn evBig" data-ev="ESPULSIONE" type="button">
            <div class="evIcon">🟥</div><div class="evTxt">ESPULSIONE</div>
            <span id="espBadge" class="badge badge-red hidden">0</span>
          </button>

          <button class="eventBtn evBig" data-ev="TIRO" type="button">
            <div class="evIcon">🎯</div><div class="evTxt">TIRO</div>
          </button>

          <button class="eventBtn evBig" data-ev="SOSTITUZIONE" type="button">
            <div class="evIcon">🔁</div><div class="evTxt">SOSTITUZIONE</div>
            <span id="subBadge" class="badge badge-blue hidden">0</span>
          </button>
        </div>

        <div class="divider"></div>

        <div class="h2">Eventi</div>
        <div id="eventsList" class="eventsList"></div>

        <div class="spacer"></div>

        <div class="actionRow">
          <div class="actionLeft">
            <button id="btnBackLive" class="btn full ghost" type="button">BACK</button>
          </div>
          <div class="actionRight">
            <button id="btnGoClose" class="btn big full danger" type="button">🏁 Vai a Chiusura</button>
          </div>
        </div>

      </div>
    </section>

    <!-- CHIUSURA -->
    <section id="viewClose" class="view hidden">
      <div class="card">
        <div class="h2">Referto Chiusura</div>

        <div class="scoreboard">
          <div class="sbTeam">
            <div id="teamHome2" class="sbName">ALTO GARDA</div>
            <div id="scoreHome2" class="sbScore">0</div>
          </div>
          <div class="sbMid">-</div>
          <div class="sbTeam">
            <div id="teamAway2" class="sbName">AVVERSARIO</div>
            <div id="scoreAway2" class="sbScore">0</div>
          </div>
        </div>

        <div class="spacer"></div>

        <label class="label">Voto (obbligatorio)</label>
        <input id="vote" class="input" inputmode="decimal" placeholder="Es: 3.5" />

        <label class="label">Note</label>
        <textarea id="notes" class="input" rows="4" placeholder="Note libere..."></textarea>

        <div class="spacer"></div>

        <div class="actionRow">
          <div class="actionLeft">
            <button id="btnBackClose" class="btn full ghost" type="button">BACK</button>
          </div>
          <div class="actionRight">
            <button id="btnCloseMatch" class="btn big full danger" type="button">✅ Chiudi Referto</button>
          </div>
        </div>
      </div>
    </section>

    <!-- EXPORT -->
    <section id="viewExport" class="view hidden">
      <div class="card">
        <div class="h2">Referto Export</div>

        <div class="driveBox">
          <div id="driveLine" class="driveLine">Caricamento su GoogleDrive – In attesa</div>
          <div id="driveSub" class="driveSub"></div>
        </div>

        <div class="spacer"></div>

        <div class="exportActions">
          <button id="btnPdf" class="btn big full primary" type="button">📄 Esporta PDF</button>
          <button id="btnCopyWa" class="btn big full primary" type="button">📲 Copia WhatsApp</button>
        </div>

        <div class="spacer"></div>

        <label class="label">Anteprima WhatsApp</label>
        <textarea id="waPreview" class="input" rows="6" readonly></textarea>

        <div class="spacer"></div>

        <div class="actionRow">
          <div class="actionLeft">
            <button id="btnBackExport" class="btn full ghost" type="button">BACK</button>
          </div>
          <div class="actionRight">
            <button id="btnRestart" class="btn big full primary" type="button">🔁 Ricomincia</button>
          </div>
        </div>

        <div class="exportLogoWrap">
          <img class="exportLogo" src="logo.png" alt="AG" />
        </div>

      </div>
    </section>

  </div>

  <!-- MODAL -->
  <div id="modalOverlay" class="modalOverlay hidden">
    <div class="modalCard">
      <div class="modalHead">
        <div id="modalTitle" class="modalTitle">Titolo</div>
        <button id="modalX" class="modalX" type="button">✕</button>
      </div>
      <div id="modalMsg" class="modalMsg"></div>
      <div id="modalForm" class="modalForm"></div>
      <div id="modalErr" class="modalErr hidden"></div>
      <div id="modalBtns" class="modalBtns"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
